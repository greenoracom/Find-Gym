name: Deploy LiveSale Fitness

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: livesale-production
  cancel-in-progress: true

jobs:
  build:
    name: Build check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: |
            backend/package-lock.json
            frontend/package-lock.json
            admins-frontend/package-lock.json

      - name: Install backend dependencies
        working-directory: backend
        run: npm ci

      - name: Check backend syntax
        working-directory: backend
        run: |
          node --check src/app.js
          node --check src/server.js
          node --check src/utils/urls.js

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Build frontend
        working-directory: frontend
        env:
          VITE_API_BASE_URL: https://api.livesale.fitness/api
          VITE_BASE_URL: https://api.livesale.fitness
        run: npm run build

      - name: Install admin dependencies
        working-directory: admins-frontend
        run: npm ci

      - name: Build admin frontend
        working-directory: admins-frontend
        env:
          VITE_API_BASE_URL: https://api.livesale.fitness/api
          VITE_API_URL: https://api.livesale.fitness/api
          VITE_BASE_URL: https://api.livesale.fitness
        run: npm run build

  deploy:
    name: Deploy to VPS
    needs: build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.0.3
        env:
          ENV_PRODUCTION: ${{ secrets.ENV_PRODUCTION }}
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_KEY }}
          passphrase: ${{ secrets.DEPLOY_KEY_PASSPHRASE }}
          password: ${{ secrets.DEPLOY_PASSWORD }}
          port: ${{ secrets.DEPLOY_PORT || 22 }}
          envs: ENV_PRODUCTION
          script_stop: true
          script: |
            set -e
            cd "${{ secrets.DEPLOY_PATH }}"
            git pull --ff-only origin main
            printf '%s\n' "$ENV_PRODUCTION" > .env.production
            docker compose --env-file .env.production -f docker-compose.prod.yml up -d --build --remove-orphans
            docker compose --env-file .env.production -f docker-compose.prod.yml ps
            docker image prune -f
