map $http_upgrade $connection_upgrade {
  default upgrade;
  '' close;
}

upstream livesale_frontend {
  server frontend:80;
}

upstream livesale_admin {
  server admin:80;
}

upstream livesale_backend {
  server backend:5000;
}

server {
  listen 80;
  server_name livesale.fitness www.livesale.fitness api.livesale.fitness admin.livesale.fitness;

  location /.well-known/acme-challenge/ {
    root /var/www/certbot;
  }

  location / {
    return 301 https://$host$request_uri;
  }
}

server {
  listen 443 ssl http2;
  server_name livesale.fitness www.livesale.fitness;

  ssl_certificate /etc/letsencrypt/live/livesale.fitness/fullchain.pem;
  ssl_certificate_key /etc/letsencrypt/live/livesale.fitness/privkey.pem;
  ssl_session_timeout 1d;
  ssl_session_cache shared:LiveSaleSSL:10m;
  ssl_protocols TLSv1.2 TLSv1.3;
  ssl_prefer_server_ciphers off;

  add_header X-Frame-Options SAMEORIGIN always;
  add_header X-Content-Type-Options nosniff always;
  add_header Referrer-Policy strict-origin-when-cross-origin always;

  location / {
    proxy_pass http://livesale_frontend;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }
}

server {
  listen 443 ssl http2;
  server_name admin.livesale.fitness;

  ssl_certificate /etc/letsencrypt/live/livesale.fitness/fullchain.pem;
  ssl_certificate_key /etc/letsencrypt/live/livesale.fitness/privkey.pem;
  ssl_session_timeout 1d;
  ssl_session_cache shared:LiveSaleSSL:10m;
  ssl_protocols TLSv1.2 TLSv1.3;
  ssl_prefer_server_ciphers off;

  add_header X-Frame-Options SAMEORIGIN always;
  add_header X-Content-Type-Options nosniff always;
  add_header Referrer-Policy strict-origin-when-cross-origin always;

  location / {
    proxy_pass http://livesale_admin;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }
}

server {
  listen 443 ssl http2;
  server_name api.livesale.fitness;

  ssl_certificate /etc/letsencrypt/live/livesale.fitness/fullchain.pem;
  ssl_certificate_key /etc/letsencrypt/live/livesale.fitness/privkey.pem;
  ssl_session_timeout 1d;
  ssl_session_cache shared:LiveSaleSSL:10m;
  ssl_protocols TLSv1.2 TLSv1.3;
  ssl_prefer_server_ciphers off;

  client_max_body_size 50m;

  add_header X-Content-Type-Options nosniff always;
  add_header Referrer-Policy strict-origin-when-cross-origin always;

  location / {
    proxy_pass http://livesale_backend;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection $connection_upgrade;
    proxy_read_timeout 300s;
    proxy_send_timeout 300s;
  }
}
